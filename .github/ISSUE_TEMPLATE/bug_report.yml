name: Bug Report
description: Report defects in product or platform behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear summary of the observed defect.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Include expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User impact, business impact, and urgency.
