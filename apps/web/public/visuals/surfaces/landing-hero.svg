<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="landing-hero">
  <defs>
    <linearGradient id="bg-landing-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3657" />
      <stop offset="58%" stop-color="#3a2127" />
      <stop offset="100%" stop-color="#080b12" />
    </linearGradient>
    <radialGradient id="flare-landing-hero" cx="72%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#d5ab67" stop-opacity="0.48" />
      <stop offset="100%" stop-color="#d5ab67" stop-opacity="0" />
    </radialGradient>
    <filter id="grain-landing-hero">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <filter id="blur-landing-hero">
      <feGaussianBlur stdDeviation="42" />
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg-landing-hero)" />
  <rect width="1600" height="900" fill="url(#flare-landing-hero)" />
  <g opacity="0.4">
    <path d="M-60,248 C180,128 480,428 760,178 C1030,-42 1310,438 1680,218" fill="none" stroke="#d5ab67" stroke-opacity="0.45" stroke-width="2.5" />
    <path d="M-80,448 C220,298 530,578 830,358 C1120,168 1390,558 1690,378" fill="none" stroke="#d5ab67" stroke-opacity="0.25" stroke-width="1.6" />
    <path d="M-50,768 C220,628 540,863 860,658 C1160,568 1400,838 1680,723" fill="none" stroke="#f4e2bd" stroke-opacity="0.2" stroke-width="1.2" />
  </g>
  <g filter="url(#blur-landing-hero)" opacity="0.3">
    <ellipse cx="148" cy="98" rx="220" ry="130" fill="#d5ab67" />
    <ellipse cx="1280" cy="720" rx="250" ry="140" fill="#2b5a71" />
  </g>
  <g filter="url(#grain-landing-hero)">
    <rect width="1600" height="900" fill="#fff" />
  </g>
  <text x="90" y="756" fill="#f5e9d2" fill-opacity="0.82" font-size="36" letter-spacing="0.08em" font-family="Georgia,serif">LANDING HERO</text>
  <text x="90" y="804" fill="#d8c6a4" fill-opacity="0.75" font-size="22" font-family="Georgia,serif">cinematic investigation board with illuminated strings</text>
</svg>
