<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="library">
  <defs>
    <linearGradient id="bg-library" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3148" />
      <stop offset="58%" stop-color="#2d2231" />
      <stop offset="100%" stop-color="#080b12" />
    </linearGradient>
    <radialGradient id="flare-library" cx="72%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#d8bc85" stop-opacity="0.48" />
      <stop offset="100%" stop-color="#d8bc85" stop-opacity="0" />
    </radialGradient>
    <filter id="grain-library">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08" />
      </feComponentTransfer>
    </filter>
    <filter id="blur-library">
      <feGaussianBlur stdDeviation="42" />
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg-library)" />
  <rect width="1600" height="900" fill="url(#flare-library)" />
  <g opacity="0.4">
    <path d="M-60,247 C180,127 480,427 760,177 C1030,-43 1310,437 1680,217" fill="none" stroke="#d8bc85" stroke-opacity="0.45" stroke-width="2.5" />
    <path d="M-80,477 C220,327 530,607 830,387 C1120,197 1390,587 1690,407" fill="none" stroke="#d8bc85" stroke-opacity="0.25" stroke-width="1.6" />
    <path d="M-50,737 C220,597 540,832 860,627 C1160,537 1400,807 1680,692" fill="none" stroke="#f4e2bd" stroke-opacity="0.2" stroke-width="1.2" />
  </g>
  <g filter="url(#blur-library)" opacity="0.3">
    <ellipse cx="147" cy="97" rx="220" ry="130" fill="#d8bc85" />
    <ellipse cx="1280" cy="720" rx="250" ry="140" fill="#2b5a71" />
  </g>
