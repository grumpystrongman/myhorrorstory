<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="onboarding">
  <defs>
    <linearGradient id="bg-onboarding" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e304f" />
      <stop offset="58%" stop-color="#33212f" />
      <stop offset="100%" stop-color="#080b12" />
    </linearGradient>
    <radialGradient id="flare-onboarding" cx="72%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#cfb07a" stop-opacity="0.48" />
      <stop offset="100%" stop-color="#cfb07a" stop-opacity="0" />
    </radialGradient>
    <filter id="grain-onboarding">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
