  <g opacity="0.4">
    <path d="M-60,279 C180,159 480,459 760,209 C1030,-11 1310,469 1680,249" fill="none" stroke="#cfb07a" stroke-opacity="0.45" stroke-width="2.5" />
    <path d="M-80,539 C220,389 530,669 830,449 C1120,259 1390,649 1690,469" fill="none" stroke="#cfb07a" stroke-opacity="0.25" stroke-width="1.6" />
    <path d="M-50,759 C220,619 540,854 860,649 C1160,559 1400,829 1680,714" fill="none" stroke="#f4e2bd" stroke-opacity="0.2" stroke-width="1.2" />
  </g>
  <g filter="url(#blur-onboarding)" opacity="0.3">
