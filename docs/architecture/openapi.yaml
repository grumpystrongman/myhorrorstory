openapi: 3.1.0
info:
  title: MyHorrorStory API
  version: 1.1.0
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /auth/signup:
    post:
      summary: Create account
      responses:
        '201':
          description: Created
  /auth/signin:
    post:
      summary: Sign in
      responses:
        '201':
          description: Signed in
  /stories:
    get:
      summary: List stories
      responses:
        '200':
          description: Story package list
  /stories/{id}:
    get:
      summary: Get story package by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Story package
        '404':
          description: Not found
  /parties:
    post:
      summary: Create party session
      responses:
        '201':
          description: Party created
    get:
      summary: List parties
      responses:
        '200':
          description: Party list
  /channels/inbound:
    post:
      summary: Process inbound multi-channel player message
      responses:
        '201':
          description: Inbound event accepted and processed
  /channels/setup:
    get:
      summary: Retrieve provider readiness and webhook URLs for SMS/WhatsApp/Telegram
      responses:
        '200':
          description: Channel setup status
  /channels/setup/user:
    get:
      summary: Retrieve mapped channels for a specific case/player
      responses:
        '200':
          description: Player channel mapping
        '404':
          description: Mapping not found
    post:
      summary: Register or update a player's channel contact mapping
      responses:
        '201':
          description: Player channel mapping updated
  /channels/setup/test:
    post:
      summary: Send setup validation messages to mapped player channels
      responses:
        '201':
          description: Setup test messages queued/delivered
  /channels/send:
    post:
      summary: Send live case message across mapped SMS/WhatsApp/Telegram channels
      responses:
        '201':
          description: Message delivered through channel provider chain
        '404':
          description: Mapping not found
  /webhooks/twilio:
    post:
      summary: Twilio webhook ingress for SMS and WhatsApp inbound traffic
      responses:
        '200':
          description: Webhook accepted
        '401':
          description: Invalid signature when signature validation is enabled
  /webhooks/telegram:
    post:
      summary: Telegram bot webhook ingress
      responses:
        '200':
          description: Webhook accepted
        '401':
          description: Invalid webhook secret token
  /story-rules/evaluate:
    post:
      summary: Evaluate trigger DSL rules against runtime state
      responses:
        '200':
          description: Trigger evaluation result
  /narrative/events/next:
    post:
      summary: Generate next adaptive narrative event card for ARG runtime
      responses:
        '200':
          description: Narrative event card with media prompt, responses, and consequences
  /investigation/board:
    put:
      summary: Upsert investigation board state
      responses:
        '200':
          description: Board persisted
  /support/tickets:
    post:
      summary: Create support ticket
      responses:
        '201':
          description: Ticket created
    get:
      summary: List support tickets
      responses:
        '200':
          description: Ticket list
  /billing/checkout:
    post:
      summary: Start billing checkout
      responses:
        '201':
          description: Checkout session
  /growth/lead-capture:
    post:
      summary: Capture lead and sync CRM
      responses:
        '201':
          description: Lead captured
